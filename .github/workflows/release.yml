name: Release

# Cut a GitHub Release from a pushed version tag (e.g. `git tag v0.6.2 && git
# push origin v0.6.2`). The release body is the matching section of CHANGELOG.md.
# `workflow_dispatch` allows a manual re-run from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # A release tag must match the version it ships, or the CHANGELOG section and
      # the artifact would disagree. Only enforced on a tag push (not workflow_dispatch).
      - name: Assert tag matches package.json version
        if: github.ref_type == 'tag'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Pushed tag '$GITHUB_REF_NAME' does not match package.json version '$VERSION'" >&2
            exit 1
          fi

      # Print the lines between `## [<version>]` and the next `## [` heading.
      # Written to a file so multi-line content survives into the release body.
      - name: Extract changelog section
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION;
            const lines = fs.readFileSync("CHANGELOG.md", "utf8").split(/\r?\n/);
            const start = lines.findIndex((l) => l.startsWith("## [" + version + "]"));
            if (start === -1) {
              console.error("No CHANGELOG.md section found for version " + version);
              process.exit(1);
            }
            let end = lines.findIndex((l, i) => i > start && l.startsWith("## ["));
            if (end === -1) end = lines.length;
            const body = lines.slice(start + 1, end).join("\n").trim() + "\n";
            fs.writeFileSync("RELEASE_BODY.md", body);
          '

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TwinHarness v${{ steps.version.outputs.version }}
          body_path: RELEASE_BODY.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
