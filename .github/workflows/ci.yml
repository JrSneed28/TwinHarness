name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      # Build before test: the committed dist/ is the shipped artifact, and the
      # concurrency test spawns the real `node dist/cli.js` to exercise the
      # cross-process state lock.
      - name: Build
        run: npm run build

      - name: Assert dist/ is in sync with build
        run: git diff --exit-code dist/

      - name: Test
        run: npm test
