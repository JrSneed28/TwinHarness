name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: ci (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      # Build before test: the committed dist/ is the shipped artifact, and the
      # concurrency test spawns the real `node dist/cli.js` to exercise the
      # cross-process state lock.
      - name: Build
        run: npm run build

      # dist/ is the committed, shipped artifact; assert the build matches it on
      # EVERY OS (incl. windows-latest), so a CRLF-tainted dist can't slip through
      # a non-Linux runner. `.gitattributes` pins dist/** to no EOL conversion, and
      # --ignore-cr-at-eol keeps the barrier robust to any residual line-ending
      # quirk while still catching real content drift (the F-3/F-4 Windows-specific
      # tests already run as part of `npm test` on the windows-latest matrix entry).
      - name: Assert dist/ is in sync with build
        run: git diff --ignore-cr-at-eol --exit-code dist/

      - name: Test
        run: npm test

      # The shipped plugin has zero runtime dependencies; assert the production
      # tree carries no known-vulnerable packages. Dev-only advisories are not
      # shipped and are reviewed separately.
      - name: Audit production dependencies
        if: matrix.os == 'ubuntu-latest'
        run: npm audit --omit=dev
