name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: ci (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    # TEST-002 anti-regression: force pwsh on all runners (including windows-latest)
    # so the verify/coverage-report tests are exercised under PowerShell, not bash.
    # This ensures de-POSIX-ified code cannot silently regress on a bare-Windows
    # runner that has no Git Bash on PATH.
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      # Build before test: the committed dist/ is the shipped artifact, and the
      # concurrency test spawns the real `node dist/cli.js` to exercise the
      # cross-process state lock.
      - name: Build
        run: npm run build

      # dist/ is the committed, shipped artifact; assert the build reproduces it
      # byte-for-byte on EVERY OS (incl. windows-latest). tsc is pinned to LF
      # newlines (tsconfig "newLine": "lf") and esbuild always emits LF, so the
      # build is byte-identical across platforms; `.gitattributes` pins dist/** to
      # no EOL conversion so the committed LF bytes are checked out verbatim. A
      # strict (no --ignore-cr-at-eol) diff therefore catches real content drift
      # AND any CRLF-tainted dist that would break cross-platform reproducibility.
      - name: Assert dist/ is in sync with build
        run: git diff --exit-code dist/

      # Smoke-test the shipped CLI binary (package.json bin: { "th": "dist/cli.js" }).
      # Using `node dist/cli.js` rather than the `th` symlink so this works on all
      # OSes without relying on a global npm install or PATH-resolved symlinks.
      # `version` is a subcommand that exits 0 and prints the package version, so it
      # also exercises the P2-1 version single-source end-to-end. (`--help`/`--version`
      # are NOT valid flags here — the CLI is subcommand-based and exits 1 on them.)
      - name: Smoke test th CLI
        run: node dist/cli.js version

      # R-37 release-confidence: validate the shipped PLUGIN surfaces the host loads —
      # plugin/marketplace manifests, the 16 agent manifests, a LIVE MCP handshake
      # (spawn dist/mcp-server.js, JSON-RPC initialize + tools/list over stdio), and a
      # live hook Stop-gate decision over the compiled CLI. These prove the real
      # compiled artifacts start and speak the protocol — coverage the in-process unit
      # suite cannot give. Runs on EVERY OS in the matrix (pure node core, no deps).
      - name: Validate plugin + live MCP handshake
        run: node scripts/ci-plugin-mcp-validate.cjs

      - name: Test
        run: npm test

      # The shipped plugin has zero runtime dependencies; assert the production
      # tree carries no known-vulnerable packages. Dev-only advisories are not
      # shipped and are reviewed separately.
      - name: Audit production dependencies
        if: matrix.os == 'ubuntu-latest'
        run: npm audit --omit=dev

      # SEC-002 / SEC-003 visibility (informational, non-blocking): surface the
      # dev-toolchain advisories AND the bundled @modelcontextprotocol/sdk — a
      # devDependency esbuild inlines into dist/, which the `--omit=dev` gate above
      # skips. The known dev-chain highs (vite/vitest → nested esbuild) do NOT ship
      # (the production audit is the gate) and clearing them needs a breaking
      # vitest 4 migration tracked separately, so this is reported, not enforced.
      - name: Audit full dependency tree (informational — dev advisories + bundled SDK)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: npm audit
